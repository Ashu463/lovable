<script>
        // Micro-interactions for task completion
        document.querySelectorAll('.custom-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                const visual = e.target.nextElementSibling;
                if (e.target.checked) {
                    visual.classList.replace('border-outline', 'border-secondary');
                    visual.querySelector('.check-icon').classList.replace('opacity-0', 'opacity-100');
                } else {
                    visual.classList.replace('border-secondary', 'border-outline');
                    visual.querySelector('.check-icon').classList.replace('opacity-100', 'opacity-0');
                }
            });
        });
    </script>
